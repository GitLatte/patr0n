<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelişmiş Link Ayırıcı ve Kopyalayıcı</title>
<!-- Bootstrap CSS -->
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Link Ayırıcı</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Ana Sayfa</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Özellikler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">İletişim</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2 class="text-center mb-4">Link Ayırıcı ve Kopyalayıcı</h2>

    <div class="form-group">
        <label for="inputText">Manuel Link Girişi</label>
        <textarea id="inputText" class="form-control" rows="5" placeholder="Metni buraya yapıştırın..."></textarea>
    </div>
    
    <div class="text-center mb-4">
        <button class="btn btn-primary mr-2" onclick="extractLinks()">Linkleri Göster</button>
    </div>

    <div class="form-group">
        <label for="pageUrl">Web Sayfası URL'si</label>
        <input id="pageUrl" class="form-control" type="text" placeholder="Web Sayfası URL'sini girin..." />
    </div>

    <div class="text-center mb-4">
        <button class="btn btn-secondary mr-2" onclick="fetchLinksFromPage()">Bu Adresten Linkleri Ayıkla</button>
        <span class="mx-2 button-sep">ya da</span>
        <button class="btn btn-info ml-2" onclick="fetchPatronLinks()">@patr0n IPTV M3u Linklerini Göster</button>
    </div>
    
    <div class="text-center mb-4">
        <button class="btn btn-warning" id="copyAllLinksBtn" style="display:none;" onclick="copyAllLinks()">Tüm Linkleri Kopyala</button>
    </div>

    <div id="linksContainer" class="mt-4">
        <h3 id="linksHeader">Ayıklanan Linkler</h3>
        <div id="sourceInfo" class="text-muted mb-2"></div>
        <div id="links" class="alert alert-light"></div>
    </div>
    
    <div id="loadingMessage" class="alert alert-warning mt-4" style="display:none;">
        Çoklu URL adresi alınırken gecikme olabilir. Lütfen bitene kadar sayfayı yenilemeyin ya da kapatmayın.
    </div>
    <div id="newMethodMessage" class="alert alert-info mt-4" style="display:none;">
        Yeni yöntem ile URL adresleri alınacaktır.
    </div>

    <!-- Toast Bildirimi -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1050;">
        <div id="copyToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Bildirim</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Kopyalandı!
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-toast/1.0.0/js/bootstrap-toast.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="js/scripts.js"></script>
</body>
</html>
