<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelişmiş Link Ayırıcı ve Kopyalayıcı</title>
<!-- Bootstrap CSS --> 
<link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
<link href="css/styles.css" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="https://gitlatte.github.io/patr0n/img/favicon.ico">
</head>
<body>

<!-- Üst Menü -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="#"><i class="fas fa-link"></i> Link Ayırıcı</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a class="nav-link" href="#" onclick="showSection('metin-ayiklama')"><i class="fas fa-file-alt"></i> Metin Ayıkla</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" onclick="showSection('url-ayiklama')"><i class="fas fa-globe"></i> URL Ayıkla</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" onclick="showSection('patron-ayiklama')"><i class="fas fa-tv"></i> @patr0n</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#" onclick="showSection('hazir-listeler')"><i class="fas fa-list"></i> Hazır Listeler</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container mt-5">
    <div class="header text-center mb-4">
        <h1 class="header-title">Link Ayırıcı ve Kopyalayıcı</h1>
        <div class="header-underline"></div>
    </div>

    <!-- Metin Ayıklama Bölümü -->
    <div id="metin-ayiklama" class="form-group form-floating d-none">
        <label for="inputText">Metin Ekle/Linkleri Ayıkla</label>
        <textarea id="inputText" class="form-control" maxlength="102400" rows="5" placeholder="Metni buraya yapıştırın..."></textarea>
        <div class="text-center mb-4 mt-3">
            <button class="btn btn-primary mr-2" onclick="extractLinks()">Metinden Linkleri Ayıkla</button>
        </div>
    </div>

    <!-- URL Ayıklama Bölümü -->
    <div id="url-ayiklama" class="shadow p-3 mb-4 bg-white rounded d-none">
        <label for="pageUrl">Web Sayfasından Linkleri Ayıkla</label>
        <div class="input-group mb-3">
            <div class="input-group-prepend">
                <button class="btn btn-outline-primary" type="button" id="button-url" onclick="fetchLinksFromPage()">Başlat!</button>
            </div>
            <input id="pageUrl" type="text" class="form-control" placeholder="Web Sayfası URL'sini girin" aria-label="Web Sayfası URL'sini girin" aria-describedby="button-url">
        </div>
    </div>

    <!-- @patr0n Ayıklama Bölümü -->
    <div id="patron-ayiklama" class="text-center mb-4 d-none">
        <button class="btn btn-success ml-2" onclick="fetchPatronLinks()">@patr0n IPTV M3u Linklerini Göster</button>
    </div>

    <!-- Hazır Listeler Bölümü -->
    <div id="hazir-listeler" class="text-center mb-4 d-none">
        <h3>Hazır Listeler</h3>
        <ul id="playlistContainer" class="list-group">
            <!-- Hazır listeler burada görünecek -->
        </ul>
    </div>

    <!-- Custom Progress Bar -->
	<div id="customProgressContainer" style="display: none;">
    <div id="customProgress">0%</div>
	</div>


    <div class="text-center mb-4 d-flex justify-content-center">
        <button class="btn btn-warning" id="copyAllLinksBtn" style="display:none;" onclick="copyAllLinks()">Tüm Linkleri Kopyala</button>
    </div>

    <div id="linksContainer" class="mt-4">
        <span id="linksHeader" class="d-inline-flex p-2 border border-info">Sonuçlar Aşağıda Listelenir</span>
        <div id="sourceInfo" class="text-muted mb-2"></div>
        <div id="links" class="alert alert-light"></div>
    </div>
    
    <div id="loadingMessage" class="alert alert-warning mt-4" style="display:none;">
        Çoklu URL adresi alınırken gecikme olabilir. Lütfen bitene kadar sayfayı yenilemeyin ya da kapatmayın.
    </div>
    <div id="newMethodMessage" class="alert alert-info mt-4" style="display:none;">
        Yeni yöntem ile URL adresleri alınacaktır.
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="js/scripts.js"></script>
</body>
</html>
