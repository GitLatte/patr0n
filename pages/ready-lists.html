<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazır Listeler - Linkleri Topla</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="https://gitlatte.github.io/patr0n/img/favicon.ico">
    
    <style>
        :root {
            --background-color: #0c162d;
            --secondary-color: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #fff;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #050b14; /* Arka plan rengini karanlık temaya uygun ayarladık */
            color: #fff;
        }

        /* --- SİDEBAR (SOL MENÜ) TASARIMI --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            background: #0e1525 !important;
            padding: 1rem 0;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            transition: width 0.3s ease;
        }

        .sidebar-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 1rem;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7) !important;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .nav-link i {
            margin-right: 0.75rem;
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: #8e2de2;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #ffffff !important;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(142, 45, 226, 0.4);
        }

        .nav-link:hover::before {
            opacity: 1;
        }

        .nav-link:hover i {
            color: #ffffff;
            transform: scale(1.1);
        }

        .nav-link.active {
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            color: #ffffff !important;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(142, 45, 226, 0.5);
        }

        .nav-link.active i {
            color: #ffffff;
        }

        .sidebar-footer {
            padding: 1rem;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #0e1525;
            box-sizing: border-box;
        }

        .sidebar-footer p {
            margin: 0;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .sidebar-footer a {
            color: #e5edf5;
            text-decoration: none;
            font-weight: bold;
        }

        /* --- ANA İÇERİK ALANI TASARIMI --- */
        .parser-container {
            max-width: 800px;
            width: calc(100% - 290px);
            margin: 2rem auto;
            margin-left: 270px;
            padding: 2rem;
            background-color: var(--secondary-color);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 0 4px 6px var(--shadow-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .input-area {
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            box-sizing: border-box;
        }

        .list-group-item {
            margin-bottom: 1rem;
            background: linear-gradient(145deg, rgba(33, 37, 41, 0.95), rgba(23, 27, 31, 0.95));
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            padding: 1.25rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .list-group-item:hover {
            transform: translateY(-2px) translateX(5px);
            box-shadow: 0 6px 20px rgba(142, 45, 226, 0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .list-group-item .h6 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-group-item .text-muted {
            color: rgba(255, 255, 255, 0.7) !important;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-decoration: underline;
        }

        .btn {
            background: linear-gradient(45deg, #4a00e0, #8e2de2);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(142, 45, 226, 0.4);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 45, 226, 0.6);
        }

        /* --- MOBİL UYUM (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .nav-logo {
                display: none; /* Mobilde büyük logoyu gizleriz, sadece ikonlar kalır */
            }

            .nav-link span {
                display: none; /* Mobilde yazıları gizle */
            }

            .nav-link i {
                margin-right: 0;
                font-size: 1.2rem;
            }

            .sidebar-footer {
                padding: 0.5rem;
                font-size: 0.8rem;
            }

            .sidebar-footer p {
                display: none;
            }

            .sidebar-footer a {
                font-size: 0.7rem;
                word-break: break-all;
            }

            .parser-container {
                margin: 1rem auto;
                margin-left: 70px;
                width: calc(100% - 80px);
                padding: 1.2rem;
            }

            .list-group-item {
                flex-direction: column;
                align-items: stretch;
                gap: 0.75rem;
                padding: 1rem;
            }

            .list-group-item .h6,
            .list-group-item .text-muted {
                white-space: normal;
                word-wrap: break-word;
            }
        }

        @media (max-width: 480px) {
            .parser-container {
                margin-left: 65px;
                width: calc(100% - 75px);
                padding: 1rem;
            }
        }
    </style>
</head>

            </div>
            <div class="sidebar-footer">
                <p>Linkleri Topla © 2024 - ∞</p>
                <a href="https://forum.sinetech.tr/uye/latte.1668/">Latte</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="parser-container">
            <h1 class="h6 mb-4" style="font-size: 1.5rem;"><i class="fas fa-list"></i> Hazır Listeler</h1>

                <div id="playlistContainer" class="list-group">
                    </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ready-lists.js"></script>
</body>
</html>
